version: 2
updates:
  # Keeps the SHA-pinned GitHub Actions current (security patches) via PRs you
  # review — pinning to a SHA is safe, but this stops it from silently rotting.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /packages/ticket-editor
    schedule:
      interval: weekly
