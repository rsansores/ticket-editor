name: Deploy demo to GitHub Pages

# The editor demo is 100% client-side (the renderer runs in the browser via
# WebAssembly), so it deploys as static files — no server, no backend.

on:
  push:
    branches: [master]
    # Only rebuild when something that affects the demo changes.
    paths:
      - 'packages/ticket-editor/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes cancel in-flight builds.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ticket-editor
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/ticket-editor/pnpm-lock.yaml
      - uses: actions/configure-pages@v5
      - run: pnpm install --frozen-lockfile
      # The prebuilt wasm is committed under src/wasm, so no Rust toolchain is
      # needed here — the demo build just bundles it.
      - run: pnpm build:demo
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/ticket-editor/dist-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
