name: Release

# Manual, click-to-release. Publishes ticket-core (crates.io) and
# @ticket-editor/vue (npm) in lockstep, using OIDC Trusted Publishing so NO
# long-lived registry tokens are ever stored in this repo. The actual publish
# job runs in the protected `release` environment, so it waits for your manual
# approval before anything is pushed to a registry.
#
# Third-party actions are pinned to full commit SHAs (immutable) — a hijacked
# tag cannot inject code into the publish job. Dependabot proposes updates.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (semver, e.g. 0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run: build + package + validate only. No bump, tag, or publish."
        type: boolean
        default: false

# Least privilege by default; each job opts into exactly what it needs.
permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Validate the requested version string BEFORE spending CI on a bad input.
  validate-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Validate version is semver
        run: |
          printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$' \
            || { echo "::error::'$VERSION' is not a valid semver version"; exit 1; }

  # Reuse the SAME checks that gate every PR (fmt, clippy, workspace tests,
  # editor format/lint/type-check/knip) — a release can never be less-verified
  # than a PR, and there's only one place to maintain the check list.
  verify:
    needs: validate-version
    # A reusable-workflow call is capped at the permissions the caller grants it;
    # the top-level `permissions: {}` would otherwise starve its checkout.
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  release:
    needs: [validate-version, verify]
    runs-on: ubuntu-latest
    # Protected environment: configure required reviewers in repo Settings so
    # this job pauses for your approval before it publishes anything.
    environment: release
    permissions:
      contents: write # push the version-bump commit + tag
      id-token: write # OIDC for crates.io AND npm — no stored secrets
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      # ---- Bump both versions in lockstep, in the working tree only. NOT
      #      committed yet: git is updated last, after both registries accept,
      #      so a failed publish leaves the repo clean and retryable. ----
      - name: Set version (Cargo + package.json)
        run: ./scripts/set-version.sh "$VERSION"

      # ---- Toolchains. Node 24 ships npm >= 11.5.1 (required for Trusted
      #      Publishing). Do NOT `npm install -g npm@latest`: self-upgrading the
      #      bundled npm corrupts its bundled `sigstore` dep and breaks publish. ----
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: packages/ticket-editor/pnpm-lock.yaml
      - name: npm version (must be >= 11.5.1 for Trusted Publishing)
        run: npm --version

      # ---- Build BOTH artifacts before publishing anything ----
      - name: Resolve wasm-bindgen version
        id: wb
        run: |
          v=$(cargo metadata --format-version 1 \
            | jq -r '.packages[] | select(.name=="wasm-bindgen") | .version' | head -1)
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: taiki-e/install-action@5ebac0d9522d786674368e47e92963ba13f2c376 # v2
        with:
          tool: wasm-bindgen-cli@${{ steps.wb.outputs.version }}
      - name: Build renderer wasm + editor dist
        working-directory: packages/ticket-editor
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm build:wasm
          pnpm build

      # ---- Publish (both via OIDC, no stored tokens). npm first — historically
      #      the flakier of the two — so if it fails, nothing is left published. ----
      - name: Publish @ticket-editor/vue to npm
        working-directory: packages/ticket-editor
        # --ignore-scripts: dist + src/wasm already built. Real run attaches
        # provenance; dry run only validates the tarball (no upload/auth).
        run: npm publish --access public --ignore-scripts ${{ inputs.dry_run && '--dry-run' || '--provenance' }}

      - name: crates.io auth (OIDC, short-lived token)
        id: crates-auth
        if: ${{ !inputs.dry_run }}
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
      - name: Publish ticket-core to crates.io
        # Publishes from the version-bumped (uncommitted) tree; dry run only
        # packages + verifies the build.
        run: cargo publish -p ticket-core --allow-dirty ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}

      # ---- Both registries accepted — now record the release in git ----
      - name: Commit + tag + push
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "release: v$VERSION"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "v$VERSION"
