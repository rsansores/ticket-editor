# vite 8.1.4 is recent; allow it past pnpm's minimum-release-age supply-chain gate.
minimumReleaseAgeExclude:
  - vite@8.1.4
# pnpm 11 settings for this package.
# esbuild ships a native binary via a postinstall step; allow it to build.
onlyBuiltDependencies:
  - esbuild
# Don't re-run `pnpm install` before every `pnpm run`/`pnpm exec`.
verifyDepsBeforeRun: false
